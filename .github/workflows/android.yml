name: Android CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x apps/android/gradlew
      continue-on-error: true

    - name: Build with Gradle
      run: cd apps/android && ./gradlew build
      continue-on-error: true

    - name: Build Debug APK
      run: cd apps/android && ./gradlew assembleDebug
      continue-on-error: true

    - name: Build Release APK
      run: cd apps/android && ./gradlew assembleRelease
      continue-on-error: true

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: apps/android/app/build/outputs/apk/debug/app-debug.apk
      if: success()

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: apps/android/app/build/outputs/apk/release/app-release.apk
      if: success()
